<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duck Race Casino - Fixed Edition</title>
    <style>
        body { background: #0a0a0a; color: gold; font-family: Arial, sans-serif; text-align: center; margin: 0; }
        #track { background: #1e272e; width: 98%; height: 70vh; margin: 5px auto; position: relative; border: 3px solid #333; overflow: hidden; }
        .lane { height: 8.33%; border-bottom: 1px solid #2c3e50; position: relative; }
        .duck { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); transition: left 0.1s linear; }
        .duck img { height: 45px; }
        .duck-name { position: absolute; top: -15px; font-size: 13px; color: white; width: 100px; text-align: center; left: -25px; font-weight: bold; }
        #finish { position: absolute; right: 80px; top: 0; bottom: 0; width: 15px; background: red; }
        .ctrl { background: #1a1a1a; padding: 20px; display: flex; justify-content: center; gap: 15px; align-items: center; border-top: 2px solid gold; }
        button { padding: 12px 20px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; }
        .btn-go { background: #1e90ff; color: white; font-size: 20px; }
    </style>
</head>
<body>
    <div style="background: #000; padding: 15px; font-size: 24px;">
        💰 VỐN: $<span id="balText">5000</span> | 🔥 CƯỢC: $<span id="betText">0</span>
    </div>

    <div id="track">
        <div id="finish"></div>
    </div>

    <div class="ctrl">
        <div style="color: white;">CƯỢC VỊT SỐ: <input type="number" id="duckIdx" value="1" min="1" max="12" style="width: 50px; font-size: 18px;"></div>
        <button style="background: #ffa502;" onclick="addBet(1000)">+ $1000</button>
        <button style="background: #ff4757; color: white;" onclick="allIn()">TẤT TAY</button>
        <button id="goBtn" class="btn-go" onclick="startRace()">ĐUA NGAY!</button>
    </div>

    <script>
        const names = ["Trà Từ Tay", "Thằng Canh Mộ", "Dùng Thanh Nộ", "Chày Từ Ta", "Mộ Xum Xuê", "Tôn Ngộ Đu", "Trừ Ta", "Shisha Ngộ Tĩnh", "Chú Ngộ Đo", "Đường Lên Phộ", "Tày Du Ký", "Ngô Như Đụ"];

        let balance = parseInt(localStorage.getItem('duckWebBal')) || 5000;
        let currentBet = 0;
        let isRacing = false;
        const ducks = [];

        function init() {
            for(let i=0; i<12; i++) {
                const lane = document.createElement('div');
                lane.className = 'lane';
                lane.innerHTML = `<div class="duck" id="dk${i}"><span class="duck-name">${names[i]}</span><img src="vintage-racing.gif" onerror="this.src='https://i.imgur.com/vHqLh7S.gif'"></div>`;
                track.appendChild(lane);
                ducks.push({el: document.getElementById('dk'+i), x: 10});
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('balText').innerText = balance;
            document.getElementById('betText').innerText = currentBet;
            localStorage.setItem('duckWebBal', balance);
        }

        function addBet(amt) { if(!isRacing && balance >= amt) { balance -= amt; currentBet += amt; updateUI(); } }
        function allIn() { if(!isRacing && balance > 0) { currentBet += balance; balance = 0; updateUI(); } }

        function startRace() {
            if(isRacing || currentBet === 0) return;
            isRacing = true;
            document.getElementById('goBtn').disabled = true;
            let loop = setInterval(() => {
                for(let i=0; i<12; i++) {
                    ducks[i].x += Math.random() * 5;
                    ducks[i].el.style.left = ducks[i].x + 'px';
                    if(ducks[i].x >= track.offsetWidth - 130) {
                        clearInterval(loop);
                        finish(i + 1);
                        break;
                    }
                }
            }, 50);
        }

        function finish(winIdx) {
            let pick = document.getElementById('duckIdx').value;
            if(winIdx == pick) {
                balance += currentBet * 12;
                alert(`THẮNG! '${names[winIdx-1]}' đã về nhất!`);
            } else {
                alert(`THUA! '${names[winIdx-1]}' đã về nhất.`);
            }
            currentBet = 0; isRacing = false;
            document.getElementById('goBtn').disabled = false;
            ducks.forEach(d => { d.x = 10; d.el.style.left = '10px'; });
            updateUI();
        }
        init();
    </script>
</body>
</html>
