<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>FIDÉ DUCK RACE - CASINO ONLINE</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Header */
        #header { background: #1a1a1a; padding: 15px; display: flex; justify-content: space-around; align-items: center; border-bottom: 2px solid #333; }
        .stat-box { font-size: 22px; font-weight: bold; }

        /* Main Game Area */
        #main-container { display: flex; flex: 1; overflow: hidden; }
        
        /* Track */
        #track-container { flex: 3; position: relative; background: #1e272e; border-right: 20px dashed #ff4757; margin: 10px; overflow-y: auto; }
        .lane { height: 50px; border-bottom: 1px solid #2c3e50; position: relative; display: flex; align-items: center; }
        .duck { position: absolute; left: 0; width: 60px; height: 40px; z-index: 2; transition: left 0.1s linear; }
        .lane-num { margin-left: 10px; font-weight: bold; color: #555; font-size: 20px; }

        /* Chat Box */
        #chat-container { flex: 1; background: #111; display: flex; flex-direction: column; border-left: 2px solid #333; margin: 10px 10px 10px 0; border-radius: 8px; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 14px; }
        .msg { margin-bottom: 8px; line-height: 1.4; border-bottom: 1px solid #222; padding-bottom: 4px; }
        .msg-user { color: #00ff00; font-weight: bold; }
        .msg-bet { color: #ff9f43; font-style: italic; }
        .msg-sys { color: #54a0ff; font-weight: bold; text-align: center; background: #1e272e; padding: 5px; border-radius: 4px; }
        #chat-input-area { padding: 10px; display: flex; gap: 5px; background: #1a1a1a; }
        #chat-input { flex: 1; padding: 8px; border-radius: 4px; border: none; outline: none; }

        /* Controls */
        #controls { background: #1a1a1a; padding: 20px; display: flex; justify-content: center; align-items: center; gap: 15px; border-top: 2px solid #333; }
        button { padding: 12px 25px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; transition: 0.2s; }
        .btn-bet { background: #f1c40f; color: #000; }
        .btn-bet:hover { background: #d4ac0d; }
        .btn-allin { background: #ff4757; color: white; }
        input[type="number"] { padding: 10px; width: 60px; font-size: 18px; border-radius: 5px; border: none; }
        
        #total-bet-display { position: absolute; top: 10px; right: 20px; font-size: 24px; color: #00ffff; font-weight: bold; text-shadow: 0 0 10px rgba(0,255,255,0.5); z-index: 10; }
    </style>
</head>
<body>

<div id="header">
    <div class="stat-box" style="color: #f1c40f;">💰 VỐN: $<span id="balance">5000</span></div>
    <div id="timer" class="stat-box" style="color: #00ff00;">⏳ ĐỢI CƯỢC: 60s</div>
    <div class="stat-box" style="color: #ff4757;">🔥 CƯỢC CỦA BẠN: $<span id="my-bet">0</span></div>
</div>

<div id="main-container">
    <div id="track-container">
        <div id="total-bet-display">🏦 TỔNG CƯỢC: $0</div>
        <script>
            for(let i=1; i<=12; i++){
                document.write(`<div class="lane"><span class="lane-num">${i}</span><img id="duck${i}" class="duck" src="vintage-racing.gif"></div>`);
            }
        </script>
    </div>

    <div id="chat-container">
        <div style="padding: 10px; background: #222; text-align: center; font-weight: bold;">KÊNH CHAT TÀI XỈU</div>
        <div id="chat-messages"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Nhập tin nhắn..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()" style="padding: 8px 15px; background: #54a0ff; font-size: 14px;">Gửi</button>
        </div>
    </div>
</div>

<div id="controls">
    <label>CHỌN VỊT:</label>
    <input type="number" id="selected-duck" value="1" min="1" max="12">
    <button class="btn-bet" onclick="addBet(1000)">+ $1000</button>
    <button class="btn-bet" onclick="addBet(5000)">+ $5000</button>
    <button class="btn-allin" onclick="allIn()">ALL-IN</button>
</div>

<audio id="bg-music" loop>
    <source src="background_music.mp3" type="audio/mpeg">
</audio>

<script>
    // === CẤU HÌNH ===
    const DB_URL = "LINK_FIREBASE_CỦA_BẠN/.json"; 
    const playerName = "NgườiChơi_" + Math.floor(Math.random() * 9999);
    let balance = 5000;
    let myBet = 0;
    let timer = 60;
    let bettingPhase = true;
    const bgMusic = document.getElementById('bg-music');

    // Đồng bộ Chat và Tổng cược từ Firebase
    setInterval(async () => {
        try {
            const res = await fetch(DB_URL);
            const data = await res.json();
            if (data) {
                // Cập nhật tổng cược
                document.getElementById('total-bet-display').innerText = `🏦 TỔNG CƯỢC: $${data.total_bet || 0}`;
                
                // Cập nhật tin nhắn chat
                if (data.messages) {
                    const chatBox = document.getElementById('chat-messages');
                    const msgs = Object.values(data.messages);
                    chatBox.innerHTML = msgs.map(m => `<div class="msg"><span class="msg-user">${m.user}:</span> <span class="${m.type==='bet'?'msg-bet':''}">${m.text}</span></div>`).join('');
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            }
        } catch (e) {}
    }, 1500);

    async function sendMessage(text = null, type = 'text') {
        const input = document.getElementById('chat-input');
        const message = text || input.value;
        if (!message) return;

        const newMsg = { user: playerName, text: message, type: type, time: Date.now() };
        try {
            // Lấy danh sách chat hiện tại (chỉ giữ 20 tin nhắn gần nhất cho nhẹ)
            const res = await fetch(DB_URL);
            const data = await res.json();
            let messages = data.messages ? Object.values(data.messages) : [];
            messages.push(newMsg);
            if(messages.length > 20) messages.shift();

            await fetch(DB_URL, {
                method: 'PATCH',
                body: JSON.stringify({ messages: messages })
            });
            input.value = "";
        } catch (e) {}
    }

    async function addBet(amt) {
        if (!bettingPhase || balance < amt) return;
        balance -= amt;
        myBet += amt;
        document.getElementById('balance').innerText = balance;
        document.getElementById('my-bet').innerText = myBet;
        window.onclick = () => { bgMusic.play(); };

        const res = await fetch(DB_URL);
        const data = await res.json();
        const newTotal = (data.total_bet || 0) + amt;
        await fetch(DB_URL, { method: 'PATCH', body: JSON.stringify({ total_bet: newTotal }) });
        
        sendMessage(`đã đặt $${amt} vào Vịt ${document.getElementById('selected-duck').value}`, 'bet');
    }

    function allIn() { addBet(balance); }

    // Đếm ngược
    let timerInterval = setInterval(() => {
        timer--;
        if (timer > 0) {
            document.getElementById('timer').innerText = `⏳ ĐỢI CƯỢC: ${timer}s`;
        } else {
            clearInterval(timerInterval);
            startRace();
        }
    }, 1000);

    function startRace() {
        bettingPhase = false;
        document.getElementById('timer').innerText = `🚀 XUẤT PHÁT!`;
        document.getElementById('timer').style.color = "red";
        
        let positions = new Array(12).fill(0);
        let raceInterval = setInterval(() => {
            for (let i = 0; i < 12; i++) {
                positions[i] += Math.random() * 7;
                document.getElementById(`duck${i+1}`).style.left = positions[i] + 'px';
                
                if (positions[i] >= document.getElementById('track-container').offsetWidth - 80) {
                    clearInterval(raceInterval);
                    bgMusic.pause();
                    bgMusic.currentTime = 0;
                    handleWinner(i + 1);
                    break;
                }
            }
        }, 50);
    }

    async function handleWinner(winNum) {
        const selected = document.getElementById('selected-duck').value;
        let resultMsg = `Vịt số ${winNum} về nhất! `;
        
        if (selected == winNum && myBet > 0) {
            const winAmt = myBet * 12;
            balance += winAmt;
            alert(`CHÚC MỪNG! Vịt ${winNum} thắng. Bạn nhận được $${winAmt}`);
        } else {
            alert(`KẾT THÚC! Vịt số ${winNum} thắng.`);
        }
        
        // Reset Firebase cho ván mới (chỉ một người reset là đủ)
        await fetch(DB_URL, { method: 'PATCH', body: JSON.stringify({ total_bet: 0 }) });
        location.reload(); 
    }
</script>
</body>
</html>
